<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lokaya Gfx - Select Free Fire Logo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0a0a0f; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        /* Header */
        header { padding: 1.5rem; }
        .header-logo { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
        .header-logo img { width: 40px; height: 40px; border-radius: 10px; }
        .header-logo span { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3em; color: rgba(255, 255, 255, 0.9); }
        .nav-buttons { display: flex; justify-content: center; gap: 0.75rem; flex-wrap: wrap; }
        .nav-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #8b8b9a; padding: 0.75rem 1.5rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s ease; text-decoration: none; }
        .nav-btn.active { background: #0084ff; border-color: #0084ff; color: #ffffff; box-shadow: 0 0 30px rgba(0, 132, 255, 0.3); }
        .nav-btn:hover { background: rgba(0, 132, 255, 0.1); border-color: #0084ff; color: #ffffff; }
        
        /* Main */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 1rem 1.5rem 2rem; max-width: 800px; margin: 0 auto; width: 100%; }
        h2 { font-size: 1.75rem; font-weight: 700; text-align: center; margin-bottom: 1.5rem; color: #ffffff; }
        
        /* Grid */
        .post-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; width: 100%; margin-bottom: 2rem; }
        .post-card { background: #15151a; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 1rem; transition: all 0.3s; cursor: pointer; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .post-card:hover { transform: translateY(-5px); border-color: #0084ff; box-shadow: 0 10px 40px rgba(0, 132, 255, 0.2); }
        .post-preview-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; margin-bottom: 1rem; }
        .post-title { font-size: 1.1rem; font-weight: 700; color: #ffffff; text-align: center; }
        
        /* Footer */
        footer { padding: 2rem 1.5rem; text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .footer-logo { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1rem; }
        .footer-logo img { width: 48px; height: 48px; border-radius: 12px; }
        .footer-logo span { font-size: 1.25rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; }
        .footer-text { color: #8b8b9a; font-size: 0.85rem; margin-bottom: 1.5rem; max-width: 400px; margin-left: auto; margin-right: auto; line-height: 1.5; }
        .footer-copyright { color: #52525e; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 1.25rem; }
        .contact-btn { display: inline-block; background: #0084ff; color: #ffffff; padding: 0.875rem 2rem; border-radius: 12px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; text-decoration: none; box-shadow: 0 6px 20px rgba(0, 132, 255, 0.3); transition: all 0.3s ease; }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-logo">
            <img src="https://res.cloudinary.com/dsyvnaog6/image/upload/v1772862220/lokaya/avatars/tzfgxif1qzdwim1mrp42.png" alt="Lokaya Gfx">
            <span>LOKAYA GFX</span>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="window.location.href='../index.html'">HOME</button>
            <button class="nav-btn active">LOGOS</button>
            <button class="nav-btn" onclick="window.location.href='../post-system/post-system.html'">POSTS</button>
            <button class="nav-btn" onclick="alert('Coming Soon!')">THUMBNAILS</button>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <h2>Select a Logo Template</h2>
        <div class="post-grid">
            <a href="logo1/index.html" class="post-card">
                <img class="post-preview-img" src="../assets/logos/s1_c1.png" alt="Logo 1">
                <span class="post-title">Logo 1</span>
            </a>
            <a href="logo2/index.html" class="post-card">
                <img class="post-preview-img" src="https://via.placeholder.com/400x400/15151a/0084ff?text=Logo+2" alt="Logo 2">
                <span class="post-title">Logo 2</span>
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-logo">
            <img src="https://res.cloudinary.com/dsyvnaog6/image/upload/v1772862220/lokaya/avatars/tzfgxif1qzdwim1mrp42.png" alt="Lokaya Gfx">
            <span>LOKAYA GFX</span>
        </div>
        <p class="footer-text">Premium Free Fire design studio delivering elite visual identity for competitive squads.</p>
        <p class="footer-copyright">© 2026 LOKAYA GFX. ALL RIGHTS RESERVED.</p>
        <a href="https://lnk.bio/LokayaFx" target="_blank" class="contact-btn">CONTACT US</a>
    </footer>
</body>
</html>
