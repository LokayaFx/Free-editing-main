<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lokaya Gfx - Select Free Fire Logo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0084ff;
            --primary-glow: rgba(0, 132, 255, 0.4);
            --bg-dark: #0a0a0f;
            --card-bg: rgba(21, 21, 26, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #8b8b9a;
            --accent-gradient: linear-gradient(135deg, #0084ff 0%, #00c6ff 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 132, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 198, 255, 0.05) 0%, transparent 40%);
        }

        /* Header */
        header {
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .header-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .header-logo img {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .header-logo span {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 0.75rem 1.5rem;
            border-radius: 14px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .nav-btn.active {
            background: var(--accent-gradient);
            border-color: transparent;
            color: #ffffff;
            box-shadow: 0 10px 20px var(--primary-glow);
            transform: translateY(-2px);
        }

        .nav-btn:hover:not(.active) {
            background: rgba(0, 132, 255, 0.1);
            border-color: var(--primary);
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* Main */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1.5rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h2 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        /* Grid */
        .post-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 1.25rem;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .post-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 132, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 132, 255, 0.1);
        }

        .post-preview-img-container {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 1.25rem;
            background: #000;
            position: relative;
            z-index: 1;
        }

        .post-preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .post-card:hover .post-preview-img {
            transform: scale(1.1);
        }

        .card-info {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .post-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
        }

        .badge {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-trending {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .badge-new {
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        /* Footer */
        footer {
            padding: 4rem 1.5rem;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
        }

        .footer-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .footer-logo img {
            width: 50px;
            height: 50px;
            border-radius: 15px;
        }

        .footer-logo span {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .footer-text {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .footer-copyright {
            color: #52525e;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
        }

        .contact-btn {
            display: inline-block;
            background: var(--accent-gradient);
            color: #ffffff;
            padding: 1rem 2.5rem;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            text-decoration: none;
            box-shadow: 0 10px 30px var(--primary-glow);
            transition: all 0.3s ease;
        }

        .contact-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px var(--primary-glow);
        }

        @media (max-width: 600px) {
            h2 {
                font-size: 1.75rem;
            }

            .post-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

                alt="Lokaya Gfx">
            <span>LOKAYA GFX</span>

        <div class="nav-buttons">

            <button class="nav-btn" onclick="window.location.href='../post-system/post-system.html'">POSTS</button>

    <main>

    <!-- Footer -->
    <footer>

</body>

</html>
