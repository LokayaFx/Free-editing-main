<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lokaya Gfx - Logo 3 Characters</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0a0a0f; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        /* Header */
        header { padding: 1.5rem; }
        .header-logo { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
        .header-logo img { width: 40px; height: 40px; border-radius: 10px; }
        .header-logo span { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3em; color: rgba(255, 255, 255, 0.9); }
        .nav-buttons { display: flex; justify-content: center; gap: 0.75rem; flex-wrap: wrap; }
        .nav-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #8b8b9a; padding: 0.75rem 1.5rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s ease; text-decoration: none; }
        .nav-btn.active { background: #0084ff; border-color: #0084ff; color: #ffffff; box-shadow: 0 0 30px rgba(0, 132, 255, 0.3); }
        .nav-btn:hover { background: rgba(0, 132, 255, 0.1); border-color: #0084ff; color: #ffffff; }

        /* Main */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 1rem 1.5rem 2rem; max-width: 900px; margin: 0 auto; width: 100%; }
        h2 { font-size: 1.75rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; color: #ffffff; }
        .subtitle { color: #8b8b9a; font-size: 0.85rem; text-align: center; margin-bottom: 2rem; }

        /* Grid */
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; width: 100%; }
        .char-card { background: #15151a; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; overflow: hidden; cursor: pointer; text-decoration: none; display: flex; flex-direction: column; align-items: center; transition: all 0.3s ease; }
        .char-card:hover { transform: translateY(-4px); border-color: #0084ff; box-shadow: 0 10px 40px rgba(0, 132, 255, 0.2); }
        .char-card:active { transform: scale(0.97); }
        .char-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #1a1a22; display: flex; align-items: center; justify-content: center; color: #8b8b9a; font-size: 0.75rem; }
        .char-img img { width: 100%; height: 100%; object-fit: cover; }
        .char-label { padding: 0.6rem; font-size: 0.8rem; font-weight: 600; color: #ffffff; text-align: center; }

        /* Back button */
        .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #8b8b9a; padding: 0.6rem 1.2rem; border-radius: 10px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; text-decoration: none; transition: all 0.3s; margin-bottom: 1.5rem; align-self: flex-start; }
        .back-btn:hover { border-color: #0084ff; color: #ffffff; }

        /* Footer */
        footer { padding: 2rem 1.5rem; text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .footer-logo { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1rem; }
        .footer-logo img { width: 40px; height: 40px; border-radius: 10px; }
        .footer-logo span { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; }
        .footer-copyright { color: #52525e; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; }

        @media (max-width: 480px) {
            .char-grid { grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
            .char-label { font-size: 0.7rem; padding: 0.4rem; }
            h2 { font-size: 1.3rem; }
        }
    </style>
</head>
